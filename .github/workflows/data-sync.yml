name: Data Sync

on:
  schedule:
    # Refresh NVD data every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  data-sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download latest NVD data
        run: python -m src.cli.main download-data
        continue-on-error: true
      
      - name: Validate data
        run: python -m src.cli.main validate
      
      - name: Commit data update
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "Data Sync Bot"
          git add data/nvd.jsonl
          if git diff --quiet --cached; then
            echo "No data changes to commit"
          else
            git commit -m "chore: sync NVD data - $(date +'%Y-%m-%d')"
            git push
          fi
      
      - name: Report errors
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠ Data Sync Failed',
              body: `The weekly NVD data sync failed on ${new Date().toISOString()}\n\nCheck the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
