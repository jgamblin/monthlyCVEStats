name: Monthly CVE Update

on:
  schedule:
    # 13:00 UTC = 7:00 AM CST (winter) / 8:00 AM CDT (summer)
    # This is the optimal time that catches the early morning in Central Time
    - cron: "0 13 1 * *" # 1st of every month at 13:00 UTC

  # Allow manual trigger if needed
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  monthly-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Central Time execution
        run: python -m src.utils.timezone_check

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "Monthly CVE Update Bot"

      - name: Download latest NVD data
        run: python -m src.cli.main download-data

      - name: Run monthly analysis
        run: python -m src.cli.main run-monthly

      - name: Generate YTD growth report and visualizations
        run: python -m src.cli.main generate-ytd-report

      - name: Update README with statistics
        run: python -m src.cli.main update-readme-stats

      - name: Validate outputs
        run: python -m src.cli.main validate

      - name: Commit and push results
        run: |
          git add outputs/ data/nvd.jsonl README.md
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "Monthly CVE Update - $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Create GitHub Release
        if: success()
        uses: ncipollo/release-action@v1
        with:
          tag: cve-update-${{ steps.date.outputs.date }}
          name: CVE Update - ${{ steps.date.outputs.date }}
          body: "Automated monthly CVE analysis and report generation"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Monthly CVE Update Failed',
              body: `The scheduled monthly CVE update failed on ${new Date().toISOString()}\n\nCheck the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
