name: Monthly CVE Update

on:
  schedule:
    # 10:00 UTC = 5:00 AM CDT (summer) / 4:00 AM CST (winter)
    - cron: "0 10 1 * *"

  # Allow manual trigger if needed
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  monthly-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Central Time execution
        run: python -m src.utils.timezone_check

      - name: Get report month info
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "year=$(python -c "from src.config import Config; y,m = Config.get_current_month_info(); print(y)")" >> $GITHUB_OUTPUT
          echo "month=$(python -c "from src.config import Config; y,m = Config.get_current_month_info(); print(m)")" >> $GITHUB_OUTPUT
          echo "month_name=$(python -c "from src.config import Config; from datetime import datetime; y,m = Config.get_current_month_info(); print(datetime(y,m,1).strftime('%B'))")" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "Monthly CVE Update Bot"

      - name: Download latest NVD data
        run: python -m src.cli.main download-data

      - name: Run monthly analysis
        run: python -m src.cli.main run-monthly

      - name: Generate YTD growth report and visualizations
        run: python -m src.cli.main generate-ytd-report

      - name: Update README with statistics
        run: python -m src.cli.main update-readme-stats

      - name: Validate outputs
        run: python -m src.cli.main validate

      - name: Commit and push results
        run: |
          git add outputs/ README.md
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "Monthly CVE Update - $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Create GitHub Release
        if: success()
        uses: ncipollo/release-action@v1
        with:
          tag: cve-update-${{ steps.date.outputs.month_name }}-${{ steps.date.outputs.year }}
          name: "${{ steps.date.outputs.month_name }} ${{ steps.date.outputs.year }} CVE Report"
          bodyFile: outputs/${{ steps.date.outputs.year }}/post.txt
          artifacts: "outputs/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month_name }}/*,outputs/${{ steps.date.outputs.year }}/*.png,outputs/${{ steps.date.outputs.year }}/post.txt,outputs/${{ steps.date.outputs.year }}/enriched_post.txt"
          skipIfReleaseExists: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Monthly CVE Update Failed',
              body: `The scheduled monthly CVE update failed on ${new Date().toISOString()}\n\nCheck the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
